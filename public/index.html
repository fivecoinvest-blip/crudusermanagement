<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .main-card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            
            <!-- Header -->
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary">User Directory</h1>
                <p class="text-muted">Manage your users with a professional CRUD interface</p>
            </div>

            <!-- Form Card -->
            <div class="card main-card mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Add / Edit User</h5>
                    <form id="userForm" onsubmit="event.preventDefault(); saveUser();" class="row g-3">
                        <input type="hidden" id="userId">
                        <div class="col-md-4">
                            <label class="form-label">First Name</label>
                            <input type="text" id="firstname" class="form-control" placeholder="Enter first name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lastname" class="form-control" placeholder="Enter last name" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Age</label>
                            <input type="number" id="age" class="form-control" placeholder="Age" required min="1" max="120" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Save</button>
                        </div>
                        <div class="col-12 text-end">
                            <button type="button" class="btn btn-link btn-sm text-secondary" onclick="resetForm()">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Search Card -->
            <div class="card main-card mb-4 bg-light">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Search Users</h5>
                    <div class="row g-3">
                        <div class="col-md-5">
                            <input type="text" id="searchFirst" class="form-control" placeholder="Search by First Name...">
                        </div>
                        <div class="col-md-5">
                            <input type="text" id="searchLast" class="form-control" placeholder="Search by Last Name...">
                        </div>
                        <div class="col-md-2 d-flex gap-2">
                            <button class="btn btn-dark flex-grow-1" onclick="searchUsers()">Search</button>
                            <button class="btn btn-outline-secondary" onclick="loadUsers()">All</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Data Table Card -->
            <div class="card main-card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-primary">
                                <tr>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="userTable">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = 'http://localhost:3000';

    async function loadUsers() {
        const res = await fetch(`${API_URL}/users`);
        const users = await res.json();
        renderTable(users);
    }

    async function searchUsers() {
        const f = document.getElementById('searchFirst').value;
        const l = document.getElementById('searchLast').value;
        const res = await fetch(`${API_URL}/search?firstname=${f}&lastname=${l}`);
        const users = await res.json();
        renderTable(users);
    }

  async function saveUser() {
    const id = document.getElementById('userId').value;
    const data = {
        firstname: document.getElementById('firstname').value,
        lastname: document.getElementById('lastname').value,
        age: document.getElementById('age').value
    };

    try {
        const response = await fetch(id ? `${API_URL}/users/${id}` : `${API_URL}/users`, { 
            method: id ? 'PUT' : 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(data) 
        });

        const result = await response.json();

        if (!response.ok) {
            // This will show the error message sent from the server (e.g., "User already exists")
            alert(result.error || "Something went wrong");
            return; // Stop the function here so the form isn't cleared
        }

        resetForm();
        loadUsers();
    } catch (error) {
        alert("Error connecting to server");
    }
}


    async function deleteUser(id) {
        if (confirm('Are you sure you want to delete this user?')) {
            await fetch(`${API_URL}/users/${id}`, { method: 'DELETE' });
            loadUsers();
        }
    }

    function editUser(id, f, l, a) {
        document.getElementById('userId').value = id;
        document.getElementById('firstname').value = f;
        document.getElementById('lastname').value = l;
        document.getElementById('age').value = a;
        window.scrollTo(0, 0); // Scroll back to form
    }

    function resetForm() {
        document.getElementById('userId').value = '';
        document.getElementById('firstname').value = '';
        document.getElementById('lastname').value = '';
        document.getElementById('age').value = '';
    }

    function renderTable(users) {
        const tbody = document.getElementById('userTable');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No users found.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td class="align-middle">${u.firstname}</td>
                <td class="align-middle">${u.lastname}</td>
                <td class="align-middle">${u.age}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-primary me-2" onclick="editUser('${u._id}', '${u.firstname}', '${u.lastname}', ${u.age})">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${u._id}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    loadUsers();
</script>

</body>
</html>
